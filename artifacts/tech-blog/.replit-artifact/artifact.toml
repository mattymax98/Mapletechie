kind = "web"
previewPath = "/"
title = "Tech Blog"
version = "1.0.0"
id = "artifacts/tech-blog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26015

[services.development]
run = "pnpm --filter @workspace/tech-blog run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tech-blog", "run", "build" ]
publicDir = "artifacts/tech-blog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26015"
BASE_PATH = "/"
